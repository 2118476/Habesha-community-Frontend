<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- viewport-fit=cover lets content extend under the notch/status bar; CSS uses env(safe-area-inset-*) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Habesha Community</title>
    <meta name="description" content="Habesha Community — rentals, services, events, travel and home-swap for the Habesha community." />

    <!-- PWA / installable app -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="theme-color" content="#0ea5e9" />
    <link rel="icon" href="%PUBLIC_URL%/icons/app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/app-icon.svg" />

    <!-- iOS standalone / status bar -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Habesha" />
    <script>
      // Set theme BEFORE any CSS loads to prevent flash of wrong theme
      (function(){
        var t = localStorage.getItem('ui.theme') || localStorage.getItem('theme');
        document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light');
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
